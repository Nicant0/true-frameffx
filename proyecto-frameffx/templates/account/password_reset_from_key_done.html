{% extends "portfolio/base.html" %}

{% block title %}Contraseña Cambiada · FrameffX{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login">
        <div class="login-box fade-in-up" style="text-align: center;">
            <div class="auth-icon" style="font-size: 4rem; color: var(--color-success); margin-bottom: 1rem;">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1 style="margin-bottom: 1rem;">¡Contraseña Cambiada!</h1>
            <p class="login-subtitle" style="margin-bottom: 2rem;">
                Tu contraseña ha sido actualizada con éxito. 
                Ya puedes utilizar tu nueva contraseña para acceder a la plataforma.
            </p>
            <a href="{% url 'site_login' %}" class="submit-btn" style="text-decoration: none; display: inline-block;">
                Iniciar Sesión
            </a>
        </div>
    </div>
</div>
{% endblock %}
