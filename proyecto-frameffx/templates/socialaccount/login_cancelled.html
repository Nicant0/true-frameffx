{% extends "portfolio/base.html" %}

{% block title %}Inicio Cancelado | FrameffX{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login">
        <div class="login-box fade-in-up" style="text-align: center;">
            <div class="auth-icon" style="font-size: 4rem; color: var(--color-warning); margin-bottom: 1rem;">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1 class="login-title" id="login-title" style="margin-bottom: 1rem;">Inicio Cancelado</h1>
            <p class="login-subtitle" style="margin-bottom: 2rem;">
                Has cancelado el proceso de inicio de sesión con tu proveedor social. 
                Puedes volver a intentarlo cuando estés listo.
            </p>
            <div style="display: flex; gap: 15px; flex-direction: column;">
                <a href="{% url 'login' %}" class="submit-btn" style="text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 10px;">
                    <i class="fas fa-sign-in-alt"></i> Volver a intentarlo
                </a>
                <a href="{% url 'home' %}" class="social-login-btn" style="text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 10px;">
                    <i class="fas fa-home"></i> Ir al inicio
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
