{% extends "portfolio/base.html" %}

{% block title %}Inicio Cancelado | FrameffX{% endblock %}

{% block content %}
<main class="page-container auth-page">
    <div class="auth-box fade-in-up" style="text-align: center; max-width: 500px; padding: 3rem 2rem;">
        <div class="auth-icon" style="font-size: 4rem; color: var(--color-warning); margin-bottom: 1rem;">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1 class="auth-title" style="margin-bottom: 1rem;">Inicio Cancelado</h1>
        <p class="auth-subtitle" style="color: var(--color-text-muted); margin-bottom: 2rem;">
            Has cancelado el proceso de inicio de sesión con tu proveedor social. 
            Puedes volver a intentarlo cuando estés listo.
        </p>
        <div style="display: flex; gap: 15px; flex-direction: column;">
            <a href="{% url 'login' %}" class="btn btn-primary" style="display: flex; justify-content: center; gap: 10px;">
                <i class="fas fa-sign-in-alt"></i> Volver a intentarlo
            </a>
            <a href="{% url 'home' %}" class="btn btn-outline" style="display: flex; justify-content: center; gap: 10px;">
                <i class="fas fa-home"></i> Ir al inicio
            </a>
        </div>
    </div>
</main>
{% endblock %}
