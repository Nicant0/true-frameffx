{% extends "portfolio/base.html" %}

{% block title %}Acceso Denegado · FrameffX{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login">
        <div class="login-box fade-in-up" style="text-align: center;">
            <div class="auth-icon" style="font-size: 5rem; color: var(--color-danger); margin-bottom: 1rem;">
                <i class="fas fa-lock"></i>
            </div>
            <h1 style="margin-bottom: 0.5rem; font-size: 4rem; color: var(--color-text);">403</h1>
            <h2 style="margin-bottom: 1rem; font-size: 1.5rem;">Acceso Denegado</h2>
            <p class="login-subtitle" style="margin-bottom: 2rem;">
                No tienes permisos suficientes para acceder a esta página o realizar esta acción.
            </p>
            <a href="{% url 'home' %}" class="submit-btn" style="text-decoration: none; display: inline-block;">
                Volver al inicio
            </a>
        </div>
    </div>
</div>
{% endblock %}
