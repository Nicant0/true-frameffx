# ============================================================
# docker/nginx/django.conf
#
# FASE 1 (antes del certificado SSL):
#   - Solo el bloque HTTP está activo (el HTTPS está comentado).
#   - Sirve ACME Challenge de Let's Encrypt en /.well-known/
#   - Pasa el resto del tráfico a Django via proxy (HTTP sin SSL).
#
# FASE 2 (después del certificado — ejecutar setup_prod.sh):
#   - Se descomenta el bloque HTTPS de abajo.
#   - El bloque HTTP solo hace ACME challenge + redirección 301→HTTPS.
#   - Django recibe el header X-Forwarded-Proto: https para saber
#     que la conexión original era segura (SECURE_PROXY_SSL_HEADER).
# ============================================================

# ── Bloque HTTP ─────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # ACME Challenge — necesario para Let's Encrypt
    # El modificador ^~ garantiza prioridad máxima sobre cualquier regla regex
    # (como "location ~ /\." que bloquearía /.well-known/ por empezar con punto)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # FASE 1: Proxy a Django (sin SSL todavía)
    # En FASE 2, reemplazar este bloque por:
    #   location / { return 301 https://$host$request_uri; }
    location /static/ {
        alias /code/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Protección CRÍTICA: Bloquear acceso directo a los archivos digitales de pago
    location /media/productos/archivos/ {
        deny all;
        return 403;
    }

    location /media/ {
        alias /code/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        # Rate limiting: máx. 10 req/s por IP, con burst de 30 peticiones
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

